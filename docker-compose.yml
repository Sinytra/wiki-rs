name: wiki-rs

services:
  db:
    image: postgres:18.3-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: data/postgres
      POSTGRES_DB: postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - wiki
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
  cache:
    image: redis:8.6.3-trixie
    ports:
      - "6379:6379"
    networks:
      - wiki
networks:
  wiki:
    driver: bridge

volumes:
  db: