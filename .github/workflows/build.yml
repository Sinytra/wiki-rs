name: Build

on:
  push:
    branches-ignore: [ "master", "deploy/staging" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.event.pull_request == null
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: wiki-service:ci
          cache-from: |
            type=gha,scope=docker-${{ github.ref_name }}
            type=gha,scope=docker-${{ github.event.repository.default_branch }}
          cache-to: type=gha,mode=max,scope=docker-${{ github.ref_name }}
          provenance: false
          sbom: false
